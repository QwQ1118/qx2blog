{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <div class="timeline">
    {{ range .Pages.ByDate }}
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content">
          <span class="timeline-date">{{ .Date.Format "2006-01-02" }}</span>
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Summary }}</p>
        </div>
      </div>
    {{ end }}
  </div>
{{ end }}
