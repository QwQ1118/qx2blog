<script>
  (function() {
    // 获取当前页面的语言代码（从 html 标签的 lang 属性获取）
    const lang = document.documentElement.lang || '';
    // 根据语言设定面包屑首页文字
    let homeText = 'Home';
    if (lang.startsWith('zh')) {
      homeText = '主页';
    }
    // 找到面包屑导航中第一个链接（通常是唯一的首页链接）
    const breadcrumbs = document.querySelector('.breadcrumbs');
    if (!breadcrumbs) return;
    const firstLink = breadcrumbs.querySelector('a');
    if (firstLink && firstLink.textContent.trim().length < 10) {
      // 只有文字长度较短时才替换，避免误改
      firstLink.textContent = homeText;
    }
  })();
</script>
